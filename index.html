<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhisperTour</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
<script src="config.js"></script>
</head>
<body>
<div class="container">
<h1>WhisperTour</h1>
<p>P104 Smart Tour Audio System</p>

<label>角色</label>
<select id="role">
<option value="guide">我是導遊</option>
<option value="listener">我是遊客</option>
</select>

<label>姓名</label>
<input id="identity" placeholder="Guide01">

<label>4位數房間碼</label>
<div class="row">
<input id="room" maxlength="4" placeholder="1234">
<button id="generateRoom">產生</button>
</div>

<button id="joinBtn">加入導覽</button>

<div id="status">尚未連線</div>
</div>

<script src="app.js"></script>
</body>
</html>
