<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhisperTour｜P104</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
<script src="config.js"></script>
</head>
<body>
<main class="shell">
<section class="hero">
<div class="brand-mark">WT</div>
<div><h1>WhisperTour</h1><p>P104 Smart Tour Audio System</p><p class="project-title">慈濟大學 <span>經營管理學系</span> 學生專題</p></div>
</section>
<section class="panel">
<div class="mode-tabs"><button class="mode active" data-role="guide">我是導遊</button><button class="mode" data-role="listener">我是遊客</button></div>
<div class="form-grid">
<label>顯示名稱<input id="identity" type="text" placeholder="例如：Guide01 / Visitor01"></label>
<label>4 位數房間碼<div class="room-line"><input id="room" type="text" inputmode="numeric" maxlength="4" placeholder="1234"><button id="generateRoom" type="button">產生</button></div></label>
<button id="joinBtn" class="primary" type="button">加入導覽</button>
</div>
<div id="guideTools" class="guide-tools hidden">
<div class="stat-card"><span>目前收聽人數</span><strong id="listenerCount">0</strong></div>
<div class="qr-box"><div><h2>遊客掃碼加入</h2><p id="joinUrlText">尚未建立連結</p></div><img id="qrImage" alt="QRCode"></div>
</div>
<div id="connectedTools" class="connected-tools hidden">
<button id="muteBtn" class="secondary" type="button">導遊靜音</button>
<button id="leaveBtn" class="danger" type="button">離開導覽</button>
</div>
<div id="status" class="status idle">尚未連線</div>
<pre id="debug" class="debug"></pre>
</section>
<section class="note"><strong>提示：</strong>導遊端會要求麥克風權限；遊客端只收聽，不開麥克風。</section>
</main>
<script src="app.js"></script>
</body>
</html>
